<header class="topbar">
  <div>
    <h1>ClinicApp</h1>
    <p class="saludo">
      Hola, {{ usuario()?.nombre }} {{ usuario()?.apellido }}
      <span class="rol">{{ usuario()?.rol }}</span>
    </p>
  </div>

  <nav class="menu">
    <a routerLink="productos" routerLinkActive="activo">Productos</a>
    <a routerLink="inventario" routerLinkActive="activo">Inventario</a>
    <a routerLink="ventas" routerLinkActive="activo">Ventas</a>
    <!-- Solo-admin: mismo criterio que el backend
         (verifyRole(['administrador']) en las rutas de /reportes y
         /usuarios). UN solo @if para ambos links: la condición de
         visibilidad es la misma, y si algún día cambia, se cambia en
         UN único lugar. -->
    @if (esAdministrador()) {
      <a routerLink="reportes" routerLinkActive="activo">Reportes</a>
      <a routerLink="usuarios" routerLinkActive="activo">Usuarios</a>
    }
  </nav>

  <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
</header>

@if (mensajeError()) {
  <p class="estado error">{{ mensajeError() }}</p>
}

<main class="contenido">
  <router-outlet />
</main>
